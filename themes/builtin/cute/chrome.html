<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pasmello — Cute</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            font-family: var(--pm-font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
            color: var(--pm-text-primary);
            overflow: hidden;
        }
        .floating-bar {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%) translateY(0);
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 24px;
            background-color: var(--pm-bg-surface);
            border-radius: 28px;
            border: 1px solid var(--pm-border-subtle);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            opacity: 1;
            transition: transform 400ms cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 400ms ease;
        }
        .floating-bar.hidden {
            transform: translateX(-50%) translateY(-120%);
            opacity: 0;
        }
        .bar-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: var(--pm-space-xs, 4px) var(--pm-space-md, 16px);
            border-radius: 20px;
            color: var(--pm-text-secondary);
            font-size: var(--pm-font-size-sm, 0.875rem);
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: background-color 150ms ease, color 150ms ease;
        }
        .bar-item:hover {
            color: var(--pm-text-primary);
            background-color: var(--pm-bg-tertiary);
        }
        .bar-item.active {
            color: var(--pm-accent);
            background-color: var(--pm-accent-subtle);
        }
        .bar-icon {
            font-size: 1rem;
        }
        .bar-label {
            font-weight: 500;
        }
        .theme-btn {
            margin-left: 8px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <nav class="floating-bar" id="bar">
        <button class="bar-item" data-view="home">
            <span class="bar-icon">&#8962;</span><span class="bar-label">Home</span>
        </button>
        <button class="bar-item" data-view="workspaces">
            <span class="bar-icon">&#9783;</span><span class="bar-label">Workspaces</span>
        </button>
        <button class="bar-item" data-view="tools">
            <span class="bar-icon">&#128295;</span><span class="bar-label">Tools</span>
        </button>
        <button class="bar-item" data-view="workflows">
            <span class="bar-icon">&#8644;</span><span class="bar-label">Workflows</span>
        </button>
        <button class="bar-item" data-view="themes">
            <span class="bar-icon">&#127912;</span><span class="bar-label">Themes</span>
        </button>
        <button class="bar-item" data-view="settings">
            <span class="bar-icon">&#9881;</span><span class="bar-label">Settings</span>
        </button>
        <button class="bar-item theme-btn" id="theme-toggle">🌙</button>
    </nav>
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
