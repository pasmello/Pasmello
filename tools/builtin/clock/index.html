<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--pm-font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif);
            background-color: var(--pm-bg-surface, #ffffff);
            color: var(--pm-text-primary, #1d1d1f);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }
        .time {
            font-size: 3rem;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
            color: var(--pm-text-primary, #1d1d1f);
        }
        .seconds {
            font-size: 1.5rem;
            color: var(--pm-text-tertiary, #86868b);
            vertical-align: super;
            font-weight: 300;
        }
        .date {
            font-size: 0.875rem;
            color: var(--pm-text-secondary, #6e6e73);
            margin-top: 8px;
        }
        .timezone {
            font-size: 0.75rem;
            color: var(--pm-text-tertiary, #86868b);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="time" id="time">--:--<span class="seconds">--</span></div>
    <div class="date" id="date">---</div>
    <div class="timezone" id="timezone">---</div>
    <script type="module" src="./src/main.ts"></script>
</body>
</html>
